---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/apps/production
  # Legacy monolithic owner during the production app split.
  # Suspend this Kustomization before any push that removes ownership from
  # ./flux/apps/production, then retire it only after apps-db and apps-nondb
  # are healthy.
  prune: false
  wait: true
  timeout: 5m0s
