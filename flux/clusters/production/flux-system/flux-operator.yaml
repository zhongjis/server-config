---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 12h
  url: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
  ref:
    semver: "0.48.0"

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: flux-operator
    namespace: flux-system
  install:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    web:
      enabled: true
      # Anonymous Web UI is accepted for private homelab-only access.
      ingress:
        enabled: true
        className: nginx
        annotations:
          gethomepage.dev/description: Flux Operator Web UI for GitOps status.
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Cluster Management
          gethomepage.dev/name: Flux Web UI
          kubernetes.io/tls-acme: "true"
        hosts:
          - host: gitops.zshen.me
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: flux-web-ui-tls
            hosts:
              - gitops.zshen.me
