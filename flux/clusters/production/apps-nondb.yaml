---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-nondb
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: apps-db
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/apps/production-nondb
  prune: false
  wait: true
  timeout: 10m0s
