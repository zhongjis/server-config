---
apiVersion: v1
kind: Namespace
metadata:
  name: paperclip-system

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: paperclip-operator
  namespace: paperclip-system
spec:
  interval: 12h
  url: https://github.com/paperclipinc/paperclip-operator
  ref:
    tag: v0.11.2

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperclip-operator
  namespace: paperclip-system
spec:
  interval: 30m
  chart:
    spec:
      chart: charts/paperclip-operator
      sourceRef:
        kind: GitRepository
        name: paperclip-operator
        namespace: paperclip-system
      interval: 12h
  values:
    leaderElection:
      enabled: false
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
