---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-frontend
  namespace: multica
  labels:
    app.kubernetes.io/name: multica
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: multica
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multica
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "ghcr.io/multica-ai/multica-web:v0.3.21"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
