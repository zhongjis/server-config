---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-backend
  namespace: multica
  labels:
    app.kubernetes.io/name: multica
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: multica
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multica
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "ghcr.io/multica-ai/multica-backend:v0.3.21"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: multica-config
            - secretRef:
                name: multica-secrets-flux
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: multica-cnpg-cluster-app
                  key: uri
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: multica-backend-uploads
