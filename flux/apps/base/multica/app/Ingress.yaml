---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica-frontend
  namespace: multica
  annotations:
    kubernetes.io/tls-acme: "true"
  labels:
    app.kubernetes.io/name: multica
    app.kubernetes.io/component: frontend
spec:
  ingressClassName: nginx
  rules:
    - host: multica.zshen.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-frontend
                port:
                  number: 3000
  tls:
    - secretName: multica-tls
      hosts:
        - multica.zshen.me
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica-backend
  namespace: multica
  annotations:
    kubernetes.io/tls-acme: "true"
  labels:
    app.kubernetes.io/name: multica
    app.kubernetes.io/component: backend
spec:
  ingressClassName: nginx
  rules:
    - host: api.multica.zshen.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
  tls:
    - secretName: multica-api-tls
      hosts:
        - api.multica.zshen.me
