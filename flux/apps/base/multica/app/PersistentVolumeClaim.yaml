---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: multica-backend-uploads
  namespace: multica
  labels:
    app.kubernetes.io/name: multica
    app.kubernetes.io/component: backend
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
